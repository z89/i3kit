# i3kit i3 configuration
# Include this in your i3 config with: include ~/.config/i3/i3kit.conf

# Window rules for i3kit floating terminal
for_window [instance="i3kit"] floating enable, resize set 30ppt 50ppt

# Window rules for i3kit popup (quick-ask / explain long answers)
for_window [instance="i3kit-popup"] floating enable, resize set 50ppt 40ppt

# New Claude Code chat with context
bindsym $mod+a exec i3kit new

# Resume last Claude Code session
bindsym $mod+Shift+a exec i3kit resume

# Quick ask via rofi prompt
bindsym $mod+g exec i3kit-quick-ask

# Explain selected text
bindsym $mod+Shift+g exec i3kit-explain

# Fix selected code → clipboard
bindsym $mod+Mod1+g exec i3kit-fix

# Screenshot region → Claude chat
bindsym $mod+Print exec i3kit-screenshot

# Resume bookmarked session
bindsym $mod+Shift+b exec i3kit-bookmarks pick

# Save session bookmark
bindsym $mod+Mod1+b exec i3kit-bookmarks save

# Shortcut help menu
bindsym $mod+F1 exec i3kit-help

# Dynamic gaps for ultrawide monitors
exec_always --no-startup-id ~/.local/bin/start-dynamic-gaps.sh
