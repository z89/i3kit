# i3kit configuration

# Extra flags to pass to claude CLI
CLAUDE_FLAGS=""

# Comma-separated list of context sources to capture
# Available: pwd,git,history,error,window,clipboard
CONTEXT_SOURCES="pwd,git,history,error,window,clipboard"

# Number of shell history lines to capture
HISTORY_LINES=10

# Max clipboard content length to include (characters)
CLIPBOARD_MAX_CHARS=500

# Floating window dimensions (i3 ppt = percentage of screen)
KITTY_WIDTH="60ppt"
KITTY_HEIGHT="70ppt"

# Session data directory
SESSION_DIR="$HOME/.local/share/i3kit"

# Use pywal colors for kitty terminal
PYWAL_THEME=true

# Max characters for notification display (longer answers open in popup)
NOTIFICATION_CHAR_LIMIT=300

# Show dunst notification when a Claude session exits
NOTIFY_ON_EXIT=true
